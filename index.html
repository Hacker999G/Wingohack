<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Key Access - Developer Gopal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* প্রিমিয়াম ডার্ক গ্লাসমরফিজম ডিজাইন */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        #user-photo {
            border-radius: 50%;
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
            border: 2px solid #38bdf8;
            padding: 3px;
        }
        h2 { margin: 10px 0; font-size: 22px; color: #f8fafc; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.8);
            color: #38bdf8;
            font-weight: bold;
            text-align: center;
            font-size: 16px;
            box-sizing: border-box;
            letter-spacing: 1px;
        }
        input:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        
        .btn {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.98); }
        
        .contact-link {
            display: inline-block;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
        }
        .contact-link b { color: #38bdf8; }

        #main-content { display: none; }
    </style>
</head>
<body>

<div class="container" id="login-box">
    <img id="user-photo" src="https://via.placeholder.com/80" alt="Avatar">
    <h2 id="user-name">Welcome</h2>
    <p>সফটওয়্যারটি ব্যবহার করতে ইউনিক কি (Key) দিন</p>
    
    <input type="text" id="access-key" placeholder="অ্যাক্সেস কি লিখুন...">
    <button class="btn" onclick="validateKey()">অ্যাক্টিভেট করুন</button>

    <a href="https://t.me/JUST_GOPAL" class="contact-link">
        আপনার কাছে কি নেই? <b>ডেভেলপার গোপাল</b>-এর সাথে যোগাযোগ করুন
    </a>
</div>

<div class="container" id="main-content">
    <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
    <h2 style="color: #38bdf8;">সফলভাবে যুক্ত হয়েছেন!</h2>
    <p>আপনার কি-টি এই ডিভাইসের জন্য সংরক্ষিত করা হয়েছে।</p>
    <button class="btn" onclick="tg.close()">অ্যাপটি বন্ধ করুন</button>
</div>

<script>
    // ১. টেলিগ্রাম ইনিশিয়ালাইজেশন
    let tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe.user;
    
    if(user) {
        document.getElementById('user-name').innerText = user.first_name;
        if(user.photo_url) document.getElementById('user-photo').src = user.photo_url;
    }

    // ২. আপনার দেওয়া Firebase কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyCx3LLV88dkBKXj4nvHNSLtc3GJSNbcYbM",
        authDomain: "wingohack-36674.firebaseapp.com",
        projectId: "wingohack-36674",
        databaseURL: "https://wingohack-36674-default-rtdb.firebaseio.com", // প্রোজেক্ট আইডি অনুযায়ী ইউআরএল
        storageBucket: "wingohack-36674.firebasestorage.app",
        messagingSenderId: "344636000633",
        appId: "1:344636000633:web:63a06f019b4e35ec4647a8",
        measurementId: "G-PVKT75Y0KP"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ৩. কি (Key) ভ্যালিডেশন ফাংশন
    async function validateKey() {
        const inputKey = document.getElementById('access-key').value.trim();
        const userId = user ? user.id : "unknown_user"; // ইউজারের টেলিগ্রাম আইডি

        if (!inputKey) {
            tg.showAlert("দয়া করে একটি বৈধ Key প্রদান করুন!");
            return;
        }

        tg.MainButton.showProgress(); // লোডিং শুরু

        const keyRef = db.ref('keys/' + inputKey);

        keyRef.once('value', (snapshot) => {
            const data = snapshot.val();

            if (data === null) {
                tg.showAlert("দুঃখিত, এই কি (Key) টি সঠিক নয়!");
            } else if (data.used_by && data.used_by !== userId) {
                tg.showAlert("এই কি-টি ইতিমধ্যে অন্য একজন ইউজার ব্যবহার করছেন!");
            } else {
                // কি সঠিক এবং ইউজারের আইডির সাথে লক করে দেওয়া হচ্ছে
                keyRef.update({
                    used_by: userId,
                    status: "used",
                    last_login: new Date().toLocaleString(),
                    user_name: user ? user.first_name : "N/A"
                });

                // ইন্টারফেস পরিবর্তন
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                tg.HapticFeedback.notificationOccurred('success');
            }
            tg.MainButton.hideProgress();
        });
    }
</script>

</body>
</html>
