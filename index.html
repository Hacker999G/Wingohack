<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Elite Hack</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #00f2ff; --bg: #050810; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .active-nav { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
        .premium-btn { background: linear-gradient(135deg, #00f2ff, #7000ff); transition: 0.2s; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="overflow-hidden">

    <header class="p-5 flex justify-between items-center animate__animated animate__fadeInDown">
        <div class="flex items-center gap-3">
            <img id="u_img" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-2xl border border-cyan-500/50 object-cover">
            <div>
                <h2 id="u_name" class="font-bold text-sm">Loading...</h2>
                <p class="text-[10px] text-cyan-400 font-mono">STATUS: <span id="status_text">UNPAID</span></p>
            </div>
        </div>
        <div class="glass px-3 py-1 text-[10px] font-bold text-cyan-300">SERVER: ONLINE</div>
    </header>

    <main class="h-[calc(100vh-160px)] overflow-y-auto px-5">
        <section id="sec-plan" class="animate__animated animate__fadeIn">
            <h1 class="text-2xl font-black mb-6">CHOOSE <span class="text-cyan-400">PLAN</span></h1>
            <div class="space-y-4" id="plan-container">
                </div>
        </section>

        <section id="sec-predict" class="hidden-section relative min-h-[400px]">
            <div id="lock-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center text-center p-6 rounded-3xl bg-black/60 backdrop-blur-md">
                <div class="text-4xl mb-4">🔒</div>
                <h3 class="text-xl font-bold">Access Denied</h3>
                <p class="text-sm text-gray-400 mt-2">প্লান কিনলে অটোমেটিক এই পেজ আনলক হবে।</p>
                <button onclick="showSection('plan')" class="mt-5 px-6 py-2 bg-white text-black rounded-full font-bold text-sm">Buy Now</button>
            </div>
            <div id="predict-content" class="blur-sm pointer-events-none opacity-50">
                <h1 class="text-2xl font-black mb-6 text-cyan-400 uppercase">Predictor</h1>
                <div class="glass p-6">
                    <select id="app_type" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-5 outline-none"><option>Dk win</option><option>Amar club</option><option>Hazynice</option></select>
                    <input type="number" id="p_num" placeholder="Period (e.g. 320)" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-8 text-center text-3xl font-black text-cyan-400">
                    <button onclick="generate()" id="g_btn" class="premium-btn w-full py-5 rounded-2xl font-black">ANALYZE SERVER</button>
                </div>
                <div id="res_box" class="hidden mt-8 text-center animate__animated animate__zoomIn">
                    <h2 id="final_res" class="text-7xl font-black my-4">BIG</h2>
                </div>
            </div>
        </section>

        <section id="sec-profile" class="hidden-section animate__animated animate__fadeIn">
            <div class="glass p-8 text-center mt-5">
                <img id="p_img" src="https://via.placeholder.com/100" class="w-24 h-24 mx-auto rounded-3xl border-2 border-cyan-500/30 p-1 mb-4 object-cover">
                <h2 id="p_name" class="text-2xl font-bold italic">User Name</h2>
                <p id="p_id" class="text-gray-500 font-mono text-xs mt-1">ID: 00000000</p>
                <div class="mt-8 grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl"><span class="block text-[10px] text-gray-400">EXPIRY</span><span class="text-sm font-bold text-red-400" id="exp">EXPIRED</span></div>
                    <div class="bg-white/5 p-4 rounded-2xl"><span class="block text-[10px] text-gray-400">WIN RATE</span><span class="text-sm font-bold text-green-400">98%</span></div>
                </div>
                <button onclick="window.open('https://t.me/Ruddro_nill?text=আমি Wingo hack বট থেকে এসেছি। সাপোর্ট চাই!! 😭')" class="w-full mt-6 py-4 glass text-sm font-bold">💬 Official Support</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-5 right-5 h-20 glass flex items-center justify-around z-[100] border-white/20">
        <button onclick="showSection('plan')" id="n-plan" class="active-nav text-xs"><span>💳</span><br>PLAN</button>
        <button onclick="showSection('predict')" id="n-predict" class="text-xs"><span>🎯</span><br>SIGNAL</button>
        <button onclick="showSection('profile')" id="n-profile" class="text-xs"><span>👤</span><br>USER</button>
    </nav>

    <div id="pay-modal" class="fixed inset-0 z-[200] hidden bg-black/80 flex items-end">
        <div class="w-full bg-[#e11d48] rounded-t-[40px] p-8 animate__animated animate__slideInUp">
            <h2 class="text-2xl font-black text-white text-center mb-6 uppercase">Nagad Payment</h2>
            <div class="bg-white rounded-3xl p-6 text-black mb-6">
                <div class="flex justify-between items-center pb-3"><span>Number</span><span class="font-bold">01983256576</span></div>
                <div class="flex justify-between items-center"><span>Amount</span><span id="amt-text" class="text-2xl font-black text-rose-600">৳0</span></div>
            </div>
            <input type="text" id="trx" placeholder="Enter TrxID" class="w-full p-5 rounded-2xl bg-black/10 border border-white/20 text-white font-bold outline-none mb-4">
            <button onclick="sendReq()" class="w-full py-5 bg-white text-rose-600 rounded-2xl font-black uppercase">Confirm Deposit</button>
            <button onclick="closePay()" class="w-full mt-4 text-white/60 text-sm">Cancel</button>
        </div>
    </div>

    <script>
        const dbURL = "https://ff-esport-bd-9dbc0-default-rtdb.firebaseio.com";
        let tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe.user || { first_name: "Gopal", id: "7071188264", username: "unknown" };
        let isPaid = false;
        let activePlan = "";

        // Sync UI with User Data
        document.getElementById('u_name').innerText = user.first_name;
        document.getElementById('p_name').innerText = user.first_name;
        document.getElementById('p_id').innerText = "@" + (user.username || "nill") + " | ID: " + user.id;
        if(user.photo_url) {
            document.getElementById('u_img').src = user.photo_url;
            document.getElementById('p_img').src = user.photo_url;
        }

        // Render Plans
        const plans = [ {d:'3 Days', p:300}, {d:'7 Days', p:650}, {d:'15 Days', p:1400}, {d:'30 Days', p:2500}, {d:'6 Months', p:12000}, {d:'1 Year', p:20000} ];
        plans.forEach(plan => {
            document.getElementById('plan-container').innerHTML += `
                <div onclick="openPay('${plan.d}', ${plan.p})" class="glass p-5 flex justify-between items-center group">
                    <div><h3 class="font-bold">${plan.d}</h3><p class="text-[10px] text-gray-500">Premium Access</p></div>
                    <div class="text-right"><span class="text-xl font-black text-cyan-400">৳${plan.p}</span></div>
                </div>`;
        });

        function showSection(name) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById('sec-' + name).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('n-' + name).classList.add('active-nav');
        }

        function checkStatus() {
            fetch(`${dbURL}/users/${user.id}.json`).then(res => res.json()).then(data => {
                if(data && data.isPaid) {
                    isPaid = true;
                    document.getElementById('lock-overlay').style.display = 'none';
                    document.getElementById('predict-content').classList.remove('blur-sm', 'opacity-50', 'pointer-events-none');
                    document.getElementById('status_text').innerText = "PREMIUM ACTIVE";
                    document.getElementById('status_text').className = "text-green-400 font-bold";
                    document.getElementById('exp').innerText = data.plan;
                    document.getElementById('exp').className = "text-sm font-bold text-green-400";
                }
            });
        }

        function openPay(d, p) { activePlan = d; document.getElementById('amt-text').innerText = "৳"+p; document.getElementById('pay-modal').classList.remove('hidden'); }
        function closePay() { document.getElementById('pay-modal').classList.add('hidden'); }

        function sendReq() {
            const trx = document.getElementById('trx').value;
            if(trx.length < 4) return alert("Enter valid TrxID");
            
            const reqData = {
                u_name: user.first_name,
                u_id: user.id,
                u_username: user.username || "N/A",
                plan: activePlan,
                trx: trx,
                time: new Date().toLocaleString()
            };

            fetch(`${dbURL}/requests.json`, { method: 'POST', body: JSON.stringify(reqData) })
            .then(() => {
                alert("Request Sent! Wait for approval.");
                closePay();
            });
        }

        function generate() {
            if(!isPaid) return;
            const res = Math.random() > 0.5 ? "BIG" : "SMALL";
            document.getElementById('res_box').classList.remove('hidden');
            document.getElementById('final_res').innerText = res;
            document.getElementById('final_res').className = res === "BIG" ? "text-7xl font-black my-4 text-orange-500 animate__animated animate__pulse" : "text-7xl font-black my-4 text-blue-500 animate__animated animate__pulse";
            document.getElementById('p_num').value = parseInt(document.getElementById('p_num').value || 100) + 1;
        }

        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
