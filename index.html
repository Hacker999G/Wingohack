<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
        }
        img {
            border-radius: 50%;
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        #content { display: none; } /* লগইন এর আগে লুকানো থাকবে */
    </style>
</head>
<body>

<div class="container" id="login-box">
    <img id="user-photo" src="https://via.placeholder.com/80" alt="Profile">
    <h2 id="user-name">হ্যালো!</h2>
    <p>প্রবেশ করতে আপনার প্রাইভেট কী দিন</p>
    <input type="password" id="password" placeholder="পাসওয়ার্ড লিখুন...">
    <br>
    <button onclick="checkPassword()">লগইন</button>
</div>

<div class="container" id="content">
    <h2>স্বাগতম!</h2>
    <p>আপনি সফলভাবে লগইন করেছেন।</p>
    <button onclick="tg.close()">অ্যাপ বন্ধ করুন</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // অ্যাপটি বড় করে দেখাবে

    // ১. টেলিগ্রাম থেকে ইউজার ডাটা সংগ্রহ
    let user = tg.initDataUnsafe.user;

    if (user) {
        document.getElementById('user-name').innerText = `হ্যালো, ${user.first_name}!`;
        if (user.photo_url) {
            document.getElementById('user-photo').src = user.photo_url;
        }
    }

    // ২. পাসওয়ার্ড চেক করার ফাংশন
    function checkPassword() {
        const pass = document.getElementById('password').value;
        const correctPass = "123456"; // এখানে আপনার পাসওয়ার্ড সেট করুন

        if (pass === correctPass) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            tg.MainButton.setText("লগইন সফল!").show();
        } else {
            alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।");
        }
    }
</script>

</body>
</html>
